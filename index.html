<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Headers (X-Frame-Options must be set by the server, not meta) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
    
    <!-- Content Security Policy -->
    <!-- IMPORTANT: CSP is more secure when sent as server response headers. We remove
         inline-script allowance here; inline styles are still allowed temporarily since
         the app uses style attributes in some interactive components. To fully remove
         inline styles, switch to nonce/hash-based styles on the server and update
         any inline-style usage accordingly. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    
    <!-- SEO Meta Tags -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Silva Automation LLC" />
    <meta name="keywords" content="workflow automation, Hawaii business, service business automation, no recurring fees, fixed price automation" />
    <link rel="canonical" href="https://silvaautomation.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://silvaautomation.com/" />
    <meta property="og:title" content="Silva Automation - Workflow Automation for Hawaii Service Businesses" />
    <meta property="og:description" content="Fixed-price workflow automation for Hawaii service businesses. No recurring fees. Free assessment." />
    <meta property="og:image" content="https://silvaautomation.com/og-image.jpg" />
    <meta property="og:site_name" content="Silva Automation" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://silvaautomation.com/" />
    <meta name="twitter:title" content="Silva Automation - Workflow Automation for Hawaii Service Businesses" />
    <meta name="twitter:description" content="Fixed-price workflow automation for Hawaii service businesses. No recurring fees. Free assessment." />
    <meta name="twitter:image" content="https://silvaautomation.com/og-image.jpg" />
    
    <!-- Structured Data for LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Silva Automation LLC",
      "description": "Fixed-price workflow automation for Hawaii service businesses. No recurring fees.",
      "url": "https://silvaautomation.com",
      "telephone": "+1-808-726-6422",
      "email": "contact@silvaautomation.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "94-207 Waipahu Street #323",
        "addressLocality": "Waipahu",
        "addressRegion": "HI",
        "postalCode": "96797",
        "addressCountry": "US"
      },
      "areaServed": {
        "@type": "State",
        "name": "Hawaii"
      },
      "priceRange": "$$$",
      "openingHours": "Mo-Fr 09:00-17:00"
    }
    </script>
    
    <link rel="icon" type="image/png" href="/src/assets/icons/silva-icon.png" />
    <title>Silva Automation - Workflow Automation for Hawaii Service Businesses</title>
    <meta name="description" content="Fixed-price workflow automation for Hawaii service businesses. No recurring fees. Free assessment." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
