<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url(https://fonts.cdnfonts.com/css/bank-gothic);
    .silva-logo {
      font-family: "Bank Gothic", "BankGothic Md BT", "Arial Black", sans-serif;
      font-weight: 400;
      text-anchor: middle;
    }
  </style>
  
  <!-- SILVA - Blue outline -->
  <text class="silva-logo" x="200" y="70" font-size="72" 
        fill="none" stroke="#60A5FA" stroke-width="2." 
        textLength="280" lengthAdjust="spacing">
    SILVA
  </text>
  
  <!-- AUTOMATION - White fill with subtle stroke -->
  <text class="silva-logo" x="200" y="110" font-size="22" 
        fill="#ffffff" stroke="none" 
        textLength="280" lengthAdjust="spacing">
    AUTOMATION
  </text>
  
  <!-- Accent line matching SILVA color -->
  <line x1="120" y1="130" x2="280" y2="130" 
        stroke="#60A5FA" stroke-width="2"/>
</svg>