<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url(https://fonts.cdnfonts.com/css/bank-gothic);
    .silva-logo {
      font-family: "Bank Gothic", "BankGothic Md BT", "Arial Black", sans-serif;
      font-weight: 400;
      text-anchor: middle;
    }
  </style>
  
  <g transform="translate(30, 35) scale(2.2)">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" 
          fill="none" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4" 
          fill="none" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="silva-logo" x="230" y="70" font-size="72" 
fill="#ffffff" stroke="none"
        textLength="280" lengthAdjust="spacing">
    SILVA
  </text>
  
  <text class="silva-logo" x="230" y="110" font-size="22" 
        fill="none" stroke="#60A5FA" stroke-width="0.9" 
        textLength="260" lengthAdjust="spacing">
    AUTOMATION
  </text>
  
  <line x1="150" y1="130" x2="310" y2="130" 
        stroke="#ffffff" stroke-width="2"/>
</svg>